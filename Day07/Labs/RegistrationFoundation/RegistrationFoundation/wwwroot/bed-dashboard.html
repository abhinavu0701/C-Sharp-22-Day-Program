<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Bed Availability Dashboard</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="bed-dashboard.css">
</head>
<body>

    <!-- Page Title -->
    <h1>Hospital Bed Availability Dashboard</h1>

    <!-- Subtitle -->
    <p class="subtitle">
        Green = Available | Red = Occupied
        (Occupied beds cannot be clicked)
    </p>

    <!-- Bed Statistics -->
    <div class="stats-container">
        <h2 id="bedStats">
            Total Beds: 0 | Occupied: 0 | Available: 0
        </h2>
    </div>

    <!-- Bed Grid -->
    <div class="bed-container" id="bedContainer">
        <!-- Beds will be generated by JavaScript -->
    </div>

    <!-- JavaScript File -->
    <script src="bed-dashboard.js"></script>

</body>
</html>
